version: "3.9"
services:
  birds-db:
    image: postgres:16
    environment:
      POSTGRES_DB: birds-db
      POSTGRES_USER: test
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - ./src/main/resources/db/000_init.sql:/docker-entrypoint-initdb.d/000_init.sql
      - ./src/main/resources/db/010_data.sql:/docker-entrypoint-initdb.d/010_data.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U test -d birds-db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  birds-web:
    build: .
    container_name: birds-web
    depends_on:
      birds-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://birds-db:5432/birds-db
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: password
    ports:
      - "8080:8080"